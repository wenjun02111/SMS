#
# Firebird `databases.conf`
#
# IMPORTANT:
# - This file replaces the image's default `/opt/firebird/databases.conf`
# - It MUST include the `security.db` mapping, otherwise Firebird will fail
#

# --- Required (do not remove) ---
security.db = $(dir_secDb)/security5.fdb
{
	RemoteAccess = false
	DefaultDbCachePages = 256
}

# --- App database alias ---
#
# Connect remotely using:
#   <host>/<port>:SMS
#
SMS = /var/lib/firebird/data/SMS.FDB

